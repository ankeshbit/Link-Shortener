services:
  # FastAPI Backend Service
  - type: web
    name: bytelink-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bytelink-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bytelink-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ENV
        value: production
      - key: FRONTEND_URL
        value: https://bytelink-frontend.vercel.app  # Replace with actual Vercel frontend URL after deployment
      - key: BASE_URL
        sync: false  # Auto-loaded by Render URL in production or configure manually

# Redis Cache Service instance
  - type: redis
    name: bytelink-redis
    ipAllowList: [] # Only allow internal connection

# PostgreSQL Database Service instance
databases:
  - name: bytelink-db
    databaseName: bytelink
    user: postgres
